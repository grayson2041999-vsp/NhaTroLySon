<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Nhà trọ Lý Sơn</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0d6efd">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>
:root{
  --primary:#0d6efd; --primary-dark:#0a58ca; --primary-light:#e7f1ff;
  --ktx:#0ea5e9; --tro:#16a34a;
  --bg:#f4f6fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280;
  --border:#e5e7eb; --danger:#dc2626; --danger-light:#fee2e2;
  --warn:#d97706; --ok:#16a34a; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --radius:14px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;font-size:15px;-webkit-text-size-adjust:100%}
button{font-family:inherit;font-size:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}
a{color:var(--primary)}

.app{max-width:960px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
.topbar .ttl{font-weight:700;font-size:18px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar .sub{font-size:12px;opacity:.85;font-weight:400}
.iconbtn{background:rgba(255,255,255,.18);border:none;color:#fff;width:38px;height:38px;border-radius:10px;
  font-size:18px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.iconbtn:active{background:rgba(255,255,255,.32)}
.content{flex:1;padding:16px;padding-bottom:40px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;
  padding:11px 16px;font-weight:600;background:var(--primary);color:#fff;transition:.15s}
.btn:active{transform:scale(.97)}
.btn.block{display:flex;width:100%}
.btn.lg{padding:15px 18px;font-size:16px}
.btn.ghost{background:var(--primary-light);color:var(--primary-dark)}
.btn.sec{background:#eef0f4;color:var(--text)}
.btn.danger{background:var(--danger)}
.btn.ok{background:var(--ok)}
.btn.sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn:disabled{opacity:.5}
.row{display:flex;gap:10px;flex-wrap:wrap}.row>*{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.grid2{grid-template-columns:1fr}}
.muted{color:var(--muted)}.center{text-align:center}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge.ktx{background:#e0f2fe;color:#0369a1}.badge.tro{background:#dcfce7;color:#15803d}
.badge.warn{background:#fef3c7;color:#92400e}.badge.ok{background:#dcfce7;color:#15803d}.badge.danger{background:var(--danger-light);color:#991b1b}
.empty{text-align:center;padding:42px 16px;color:var(--muted)}.empty .ic{font-size:46px;margin-bottom:8px}
.sectitle{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:16px 2px 10px}

.hero{text-align:center;padding:30px 10px 14px}
.hero .logo{width:78px;height:78px;border-radius:22px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  color:#fff;font-size:38px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:var(--shadow)}
.hero h1{margin:0;font-size:26px}.hero p{margin:4px 0 0;color:var(--muted)}

.hcard{display:flex;align-items:center;gap:14px;cursor:pointer}
.hcard .av{width:50px;height:50px;border-radius:12px;background:var(--primary-light);color:var(--primary-dark);
  font-size:24px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.hcard .info{flex:1;min-width:0}
.hcard .info .nm{font-weight:700;font-size:16px}
.hcard .info .ad{color:var(--muted);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hcard .chev{color:var(--muted);font-size:20px}

.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 12px;background:var(--card);border-bottom:1px solid var(--border);
  position:sticky;top:66px;z-index:20;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:9px 15px;border-radius:999px;background:#f1f3f7;color:var(--muted);font-weight:600;font-size:14px;border:none;white-space:nowrap}
.tab.active{background:var(--primary);color:#fff}

.field{margin-bottom:13px}
.field label{display:block;font-weight:600;font-size:13px;margin-bottom:5px}
.field .req{color:var(--danger)}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:#fff;outline:none;transition:.15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-light)}
.field .hint{font-size:12px;color:var(--muted);margin-top:4px}
.inline-list{border:1px dashed var(--border);border-radius:10px;padding:10px;margin-bottom:8px}
.chiprow{display:flex;align-items:center;gap:8px;margin-bottom:8px}.chiprow:last-child{margin-bottom:0}
.chiprow input,.chiprow select{padding:9px 10px}
.delx{background:var(--danger-light);color:var(--danger);border:none;border-radius:8px;width:36px;height:38px;flex:0 0 auto;font-size:16px}

/* image / signature fields */
.imgslot{border:1px solid var(--border);border-radius:10px;background:#f8fafc;min-height:96px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:8px}
.imgslot img{max-width:100%;max-height:180px;display:block}
.imgslot.sig{background:#fffef5}
.imgph{color:var(--muted);font-size:13px;padding:24px}
.imgph.small{padding:10px;min-height:40px;display:flex;align-items:center;justify-content:center}
.imgbtns{display:flex;gap:8px}.imgbtns .btn{flex:1}
.sigimg{max-width:100%;max-height:140px;background:#fff;border:1px solid var(--border);border-radius:8px}
.docrow{display:flex;gap:8px;margin:8px 0}
.docell{flex:1;text-align:center}
.docthumb{width:100%;height:74px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;background:#fff}

.tablewrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:#fff}
table{border-collapse:collapse;width:100%;min-width:560px;font-size:14px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{background:#f8fafc;font-size:12px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);position:sticky;top:0}
tr:last-child td{border-bottom:none}
.roomhead td{background:var(--primary-light);font-weight:700;color:var(--primary-dark)}
.linkbtn{background:none;border:none;color:var(--primary);font-weight:600;text-decoration:underline;padding:0}

.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.modal-bg.show{opacity:1;pointer-events:auto}
.modal{background:#fff;width:100%;max-width:620px;border-radius:18px 18px 0 0;max-height:92vh;overflow:auto;transform:translateY(20px);transition:.2s}
.modal-bg.show .modal{transform:translateY(0)}
@media(min-width:620px){.modal-bg{align-items:center}.modal{border-radius:18px}}
.modal-head{position:sticky;top:0;background:#fff;padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;z-index:2}
.modal-head .mt{font-weight:700;font-size:17px;flex:1}
.modal-body{padding:18px}
.modal-foot{position:sticky;bottom:0;background:#fff;padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px}
.modal-foot .btn{flex:1}
.closex{background:#f1f3f7;border:none;width:34px;height:34px;border-radius:9px;font-size:18px;color:var(--muted)}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#111827;color:#fff;padding:12px 20px;border-radius:12px;z-index:500;opacity:0;transition:.25s;font-size:14px;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger)}.toast.ok{background:var(--ok)}

.placeholder-tab{text-align:center;padding:50px 20px;color:var(--muted)}.placeholder-tab .ic{font-size:54px;margin-bottom:10px}
.kv{display:flex;justify-content:space-between;gap:14px;padding:8px 0;border-bottom:1px solid var(--border)}.kv:last-child{border-bottom:none}
.kv .k{color:var(--muted);font-size:13px}.kv .v{font-weight:600;text-align:right}
.subbar{display:flex;gap:10px;margin-bottom:14px}.subbar .btn{flex:1}

/* signature pad overlay */
.sig-overlay{position:fixed;inset:0;background:#0b1324;z-index:300;display:none;flex-direction:column}
.sig-overlay.show{display:flex}
.sig-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;color:#fff;background:#111c33}
.sig-bar #sigTitle{flex:1;font-weight:700}
.sig-actions{display:flex;gap:8px}
#sigCanvas{flex:1;background:#fff;touch-action:none;display:block;margin:10px;border-radius:10px}
.sig-hint{color:#9fb3d1;text-align:center;padding:0 0 14px;font-size:13px}

/* image viewer */
.imgviewer{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;display:none;align-items:center;justify-content:center;padding:16px}
.imgviewer.show{display:flex}
.imgviewer img{max-width:96%;max-height:92%;border-radius:8px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar" id="topbar"></div>
  <div id="tabsHost"></div>
  <div class="content" id="content"></div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<div class="sig-overlay" id="sigOverlay">
  <div class="sig-bar"><span id="sigTitle">Ký tên</span>
    <div class="sig-actions">
      <button class="btn sec sm" onclick="sigClear()">Xoá</button>
      <button class="btn sec sm" onclick="closeSig()">Huỷ</button>
      <button class="btn ok sm" onclick="sigSave()">✓ Lưu</button>
    </div></div>
  <canvas id="sigCanvas"></canvas>
  <div class="sig-hint">Dùng ngón tay hoặc chuột ký vào khung trắng</div>
</div>

<div class="imgviewer" id="imgViewer" onclick="this.classList.remove('show')"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   NHÀ TRỌ LÝ SƠN — single-file web app
   STORE = lớp lưu trữ; SYNC = đồng bộ Google Sheet/Drive (Apps Script)
   ============================================================ */

/* ========= CẤU HÌNH ĐỒNG BỘ =========
   Dán URL Apps Script (Web App) của bạn vào giữa 2 dấu nháy bên dưới.
   Khi đã có URL, app sẽ TỰ ĐỘNG đồng bộ lên Google mỗi khi có thay đổi.
   Ví dụ: const SYNC_URL = "https://script.google.com/macros/s/AKfy.../exec";
   ===================================== */
const SYNC_URL = "https://script.google.com/macros/s/AKfycbwu6CCVyXdmStUgtdA1ERk7uv5B5rC4DMd0Qk-YrnhZylkIOc7WZdEy9117yycRrWIQ/exec";

/* ---------- STORE ---------- */
const STORE = (function(){
  const KEY='nhaTroLySon_v1';
  let data={houses:[]};
  function load(){try{const r=localStorage.getItem(KEY);if(r)data=JSON.parse(r);}catch(e){}if(!data.houses)data.houses=[];}
  function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){toast('Bộ nhớ đầy — hãy đồng bộ rồi thử lại','err');}if(typeof onDataChanged==='function')onDataChanged();}
  load();
  return {
    all:()=>data, houses:()=>data.houses,
    house:(id)=>data.houses.find(h=>h.id===id),
    addHouse:(h)=>{data.houses.push(h);save();},
    updateHouse:(id,p)=>{const h=data.houses.find(x=>x.id===id);if(h){Object.assign(h,p);save();}},
    removeHouse:(id)=>{data.houses=data.houses.filter(h=>h.id!==id);save();},
    save, export:()=>JSON.stringify(data,null,2),
    import:(j)=>{data=JSON.parse(j);if(!data.houses)data.houses=[];save();}
  };
})();

/* ---------- helpers ---------- */
const $=(s,el=document)=>el.querySelector(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=(s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=(n)=>{n=Number(n)||0;return n.toLocaleString('vi-VN')+' ₫';};
function toast(m,t=''){const e=$('#toast');e.textContent=m;e.className='toast show '+t;clearTimeout(e._t);e._t=setTimeout(()=>e.className='toast',2400);}
function fmtDate(s){if(!s)return '—';const p=String(s).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s;}
function fmtMonth(s){if(!s)return '—';const p=String(s).split('-');return p.length>=2?`${p[1]}/${p[0]}`:s;}
function newImg(){return {imgId:uid(),data:null,url:null};}
function normalizeImg(o){if(!o||typeof o!=='object')return newImg();if(!o.imgId)o.imgId=uid();if(typeof o.data==='undefined')o.data=null;if(typeof o.url==='undefined')o.url=null;return o;}
function imgSrc(o){if(!o)return '';if(o.imgId&&IMGCACHE[o.imgId])return IMGCACHE[o.imgId];return o.data||o.url||'';}
function imgHas(o){return !!(o&&(o.data||o.url||(o.imgId&&IMGCACHE[o.imgId])));}
function blankCust(){return {name:'',dob:'',phone:'',cccd:'',bienso:'',cccdPhoto:newImg(),customerPhoto:newImg(),signature:newImg()};}
function normalizeCust(c){c.cccdPhoto=normalizeImg(c.cccdPhoto);c.customerPhoto=normalizeImg(c.customerPhoto);c.signature=normalizeImg(c.signature);return c;}

/* ---------- Lưu ảnh trong IndexedDB (tránh đầy localStorage trên điện thoại) ---------- */
const IMGCACHE={};            // {imgId: dataURL} bản sao RAM để hiển thị tức thì
let IDB=null;
function idbOpen(){return new Promise((res,rej)=>{try{const r=indexedDB.open('nhaTroLySon',1);
  r.onupgradeneeded=()=>{const db=r.result;if(!db.objectStoreNames.contains('images'))db.createObjectStore('images',{keyPath:'imgId'});};
  r.onsuccess=()=>{IDB=r.result;res(IDB);};r.onerror=()=>rej(r.error);}catch(e){rej(e);}});}
function idbPut(imgId,data){return new Promise((res,rej)=>{if(!IDB)return rej(new Error('no-idb'));
  try{const t=IDB.transaction('images','readwrite');t.objectStore('images').put({imgId,data});t.oncomplete=()=>res();t.onerror=()=>rej(t.error);}catch(e){rej(e);}});}
function idbAll(){return new Promise((res)=>{if(!IDB)return res([]);
  try{const t=IDB.transaction('images','readonly');const rq=t.objectStore('images').getAll();rq.onsuccess=()=>res(rq.result||[]);rq.onerror=()=>res([]);}catch(e){res([]);}});}
function idbDelete(imgId){return new Promise((res)=>{if(!IDB||!imgId)return res();try{const t=IDB.transaction('images','readwrite');t.objectStore('images').delete(imgId);t.oncomplete=()=>res();t.onerror=()=>res();}catch(e){res();}});}
/* gom ảnh KHÁCH của 1 hợp đồng (KHÔNG gồm chữ ký người quản lý vì dùng chung) */
function contractCustomerImgs(ct){const a=[];const add=o=>{if(o)a.push(o);};if(!ct)return a;
  if(ct.type==='KTX'){if(ct.customer)['cccdPhoto','customerPhoto','signature'].forEach(k=>add(ct.customer[k]));}
  else (ct.customers||[]).forEach(c=>['cccdPhoto','customerPhoto','signature'].forEach(k=>add(c[k])));return a;}
function dropImages(imgObjs){(imgObjs||[]).forEach(o=>{if(o&&o.imgId){delete IMGCACHE[o.imgId];idbDelete(o.imgId);}});}
async function storeImage(obj,dataUrl){
  if(!obj.imgId)obj.imgId=uid();
  IMGCACHE[obj.imgId]=dataUrl;obj.url=null;
  try{await idbPut(obj.imgId,dataUrl);if('data' in obj)delete obj.data;}
  catch(e){obj.data=dataUrl;/* dự phòng khi trình duyệt chặn IndexedDB */}
}
async function migrateLocalImages(){
  let changed=false;
  async function walk(o){if(o&&o.imgId&&o.data){IMGCACHE[o.imgId]=o.data;try{await idbPut(o.imgId,o.data);delete o.data;changed=true;}catch(e){}}}
  for(const h of STORE.houses()){
    if(h.manager&&h.manager.signature)await walk(h.manager.signature);
    for(const ct of (h.contracts||[])){
      if(ct.managerSignature)await walk(ct.managerSignature);
      if(ct.type==='KTX'){if(ct.customer)for(const k of ['cccdPhoto','customerPhoto','signature'])if(ct.customer[k])await walk(ct.customer[k]);}
      else for(const c of (ct.customers||[]))for(const k of ['cccdPhoto','customerPhoto','signature'])if(c[k])await walk(c[k]);
    }
  }
  if(changed){_suppressAuto=true;STORE.save();_suppressAuto=false;}
}

/* ---------- Ngày tháng: nhập DD/MM/YYYY, hiển thị tiếng Việt ---------- */
const MONTHS_VI=['','một','hai','ba','tư','năm','sáu','bảy','tám','chín','mười','mười một','mười hai'];
function maskDmy(v){const d=(v||'').replace(/\D/g,'').slice(0,8);let o=d.slice(0,2);if(d.length>2)o+='/'+d.slice(2,4);if(d.length>4)o+='/'+d.slice(4,8);return o;}
function maskMy(v){const d=(v||'').replace(/\D/g,'').slice(0,6);let o=d.slice(0,2);if(d.length>2)o+='/'+d.slice(2,6);return o;}
function dmyToIso(s){s=(s||'').trim();if(!s)return '';const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(!m)return null;const d=+m[1],mo=+m[2],y=+m[3];if(mo<1||mo>12||d<1||d>31)return null;const dt=new Date(y,mo-1,d);if(dt.getFullYear()!==y||dt.getMonth()!==mo-1||dt.getDate()!==d)return null;return y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function myToIso(s){s=(s||'').trim();if(!s)return '';const m=s.match(/^(\d{1,2})\/(\d{4})$/);if(!m)return null;const mo=+m[1],y=+m[2];if(mo<1||mo>12)return null;return y+'-'+String(mo).padStart(2,'0');}
function isoToDmy(s){if(!s)return '';const p=String(s).split('-');return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:s;}
function isoToMy(s){if(!s)return '';const p=String(s).split('-');return p.length>=2?`${p[1]}/${p[0]}`:s;}
function fmtDateVi(s){if(!s)return '—';const p=String(s).split('-');if(p.length!==3)return s;return (+p[2])+' tháng '+(MONTHS_VI[+p[1]]||(+p[1]))+' '+(+p[0]);}
function fmtMonthVi(s){if(!s)return '—';const p=String(s).split('-');if(p.length<2)return s;return 'tháng '+(MONTHS_VI[+p[1]]||(+p[1]))+' '+(+p[0]);}

/* ---------- image resize ---------- */
function fileToResizedDataURL(file,maxW,q){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onerror=()=>rej(new Error('read'));
    r.onload=()=>{const img=new Image();
      img.onload=()=>{let w=img.width,h=img.height;if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
        const cv=document.createElement('canvas');cv.width=w;cv.height=h;
        const cx=cv.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,w,h);cx.drawImage(img,0,0,w,h);
        res(cv.toDataURL('image/jpeg',q));};
      img.onerror=()=>rej(new Error('img'));img.src=r.result;};
    r.readAsDataURL(file);
  });
}

/* ---------- app state ---------- */
const APP={screen:'entry',houseId:null,tab:'hopdong',hdView:'list'};

/* ---------- MODAL ---------- */
function openModal({title,bodyHTML,footHTML,onMount}){
  $('#modal').innerHTML=`<div class="modal-head"><div class="mt">${esc(title)}</div>
    <button class="closex" onclick="closeModal()">✕</button></div>
    <div class="modal-body">${bodyHTML}</div>${footHTML?`<div class="modal-foot">${footHTML}</div>`:''}`;
  $('#modalBg').classList.add('show');
  if(onMount)onMount($('#modal'));
}
function closeModal(){$('#modalBg').classList.remove('show');}
$('#modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal();});

/* ---------- IMAGE / SIGNATURE FIELD HELPERS ---------- */
function imgSlotInner(src){return src?`<img src="${src}">`:`<div class="imgph">Chưa có ảnh</div>`;}
function imgField(key,label,valObj){
  const pid='prev_'+key.replace(/:/g,'_');
  return `<div class="field"><label>${label} <span class="muted" style="font-weight:400;font-size:12px">(nếu có)</span></label>

function sigField(key,valObj){

function imgTargetByKey(key){
  const p=key.split(':');
  if(p[0]==='ktx')return {obj:window._ctDraft.customer,field:p[1]};
  if(p[0]==='cust')return {obj:window._ctDraft.customers[+p[1]],field:p[2]};
  return null;
}
async function storeImageForKey(key,dataUrl){
  const t=imgTargetByKey(key);if(!t||!t.obj)return;
  if(!t.obj[t.field]||typeof t.obj[t.field]!=='object')t.obj[t.field]=newImg();
  await storeImage(t.obj[t.field],dataUrl);updatePreview(key);
}
function updatePreview(key){
  const t=imgTargetByKey(key);const src=imgSrc(t&&t.obj?t.obj[t.field]:null);
  const el=document.getElementById('prev_'+key.replace(/:/g,'_'));if(el)el.innerHTML=imgSlotInner(src);
}
function signFor(key){
  openSignaturePad('Khách hàng ký tên',async(data)=>{
    const t=imgTargetByKey(key);if(!t||!t.obj)return;
    if(!t.obj[t.field]||typeof t.obj[t.field]!=='object')t.obj[t.field]=newImg();
    await storeImage(t.obj[t.field],data);updatePreview(key);
  });
}

/* ---------- SIGNATURE PAD ---------- */
let _sig={ctx:null,drawing:false,has:false,cb:null};
function openSignaturePad(title,cb){
  _sig.cb=cb;_sig.has=false;
  $('#sigTitle').textContent=title||'Ký tên';
  $('#sigOverlay').classList.add('show');
  requestAnimationFrame(()=>{
    const cv=$('#sigCanvas');cv.width=cv.clientWidth;cv.height=cv.clientHeight;
    const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);
    ctx.lineWidth=2.8;ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#0b1324';
    _sig.ctx=ctx;bindSig(cv);
  });
}
function sigPos(cv,e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function bindSig(cv){
  cv.onpointerdown=e=>{e.preventDefault();_sig.drawing=true;const p=sigPos(cv,e);_sig.ctx.beginPath();_sig.ctx.moveTo(p.x,p.y);};
  cv.onpointermove=e=>{if(!_sig.drawing)return;e.preventDefault();const p=sigPos(cv,e);_sig.ctx.lineTo(p.x,p.y);_sig.ctx.stroke();_sig.has=true;};
  cv.onpointerup=()=>{_sig.drawing=false;};
  cv.onpointerleave=()=>{_sig.drawing=false;};
}
function sigClear(){const cv=$('#sigCanvas');if(!_sig.ctx)return;_sig.ctx.fillStyle='#fff';_sig.ctx.fillRect(0,0,cv.width,cv.height);_sig.has=false;}
function closeSig(){$('#sigOverlay').classList.remove('show');}
function sigSave(){if(!_sig.has){toast('Chưa có chữ ký','err');return;}const data=$('#sigCanvas').toDataURL('image/png');closeSig();if(_sig.cb)_sig.cb(data);}

function saveContract(type,editing){
  const h=STORE.house(APP.houseId);const ct=window._ctDraft;
  const roomId=$('#c_room').value;if(!roomId){toast('Chọn phòng','err');return;}
  const rs=dmyToIso($('#c_rs').value);if(rs===null){toast('Từ ngày không hợp lệ (DD/MM/YYYY)','err');return;}
  const re=dmyToIso($('#c_re').value);if(re===null){toast('Đến ngày không hợp lệ (DD/MM/YYYY)','err');return;}
  ct.roomId=roomId;ct.rentStart=rs;ct.rentEnd=re;
  if(type==='KTX'){
    const name=$('#c_name').value.trim();if(!name){toast('Nhập họ tên khách hàng','err');return;}
    const dob=dmyToIso($('#c_dob').value);if(dob===null){toast('Ngày sinh không hợp lệ (DD/MM/YYYY)','err');return;}
    const c=ct.customer;c.name=name;c.dob=dob;c.phone=$('#c_phone').value.trim();c.cccd=$('#c_cccd').value.trim();c.bienso=$('#c_bienso').value.trim();
    ct.guardian={name:$('#g_name').value.trim(),role:$('#g_role').value,phone:$('#g_phone').value.trim()};
    ct.pricePerBed=$('#c_bed').value;
  }else{
    const cs=ct.customers.filter(c=>c.name.trim());if(!cs.length){toast('Thêm ít nhất 1 khách hàng có tên','err');return;}
    for(let i=0;i<cs.length;i++){const c=cs[i];
      const dob=dmyToIso(c.dob);if(dob===null){toast(`Khách ${i+1}: ngày sinh không hợp lệ (DD/MM/YYYY)`,'err');return;}c.dob=dob;}
    ct.customers=cs;
    ct.pricePerRoom=$('#c_room_price').value;ct.waterPerPerson=$('#c_water').value;ct.servicePerPerson=$('#c_service').value;
    ct.vehiclePerVehicle=$('#c_vehicle').value;ct.electricPerKwh=$('#c_elec').value;
  }
  ct.managerSignature=(h.manager&&imgHas(h.manager.signature))?{...h.manager.signature}:null;
  if(!h.contracts)h.contracts=[];
  if(editing){const idx=h.contracts.findIndex(x=>x.id===ct.id);const old=h.contracts[idx];
    if(old){const newIds=new Set(contractCustomerImgs(ct).map(o=>o.imgId));dropImages(contractCustomerImgs(old).filter(o=>o.imgId&&!newIds.has(o.imgId)));}
    h.contracts[idx]=ct;}else h.contracts.push(ct);
  STORE.save();enqueueOp({entity:'contract',type:'upsert',houseId:APP.houseId,contract:JSON.parse(JSON.stringify(ct))});
  closeModal();toast('Đã lưu hợp đồng','ok');render();
}

/* ============================================================ GOOGLE SYNC ============================================================ */
function getSync(){try{return JSON.parse(localStorage.getItem('nhaTroLySon_sync'))||{};}catch(e){return {};}}
function setSync(c){try{localStorage.setItem('nhaTroLySon_sync',JSON.stringify(c));}catch(e){}}
function effectiveUrl(){return (SYNC_URL&&SYNC_URL.trim())||(getSync().url||'');}
let _autoTimer=null,_suppressAuto=false,_syncing=false;
function onDataChanged(){if(_suppressAuto)return;scheduleFlush();}
/* ===== Hàng đợi thao tác: gửi từng insert/update/delete theo bản ghi ===== */
function getOutbox(){try{return JSON.parse(localStorage.getItem('nhaTroLySon_outbox'))||[];}catch(e){return [];}}
function setOutbox(a){try{localStorage.setItem('nhaTroLySon_outbox',JSON.stringify(a));}catch(e){toast('Bộ nhớ tạm đầy — kết nối mạng để đồng bộ','err');}}
function enqueueOp(op){if(!effectiveUrl())return;const q=getOutbox();q.push(op);setOutbox(q);scheduleFlush();}
function scheduleFlush(){if(!effectiveUrl())return;clearTimeout(_autoTimer);_autoTimer=setTimeout(flushOutbox,1500);}
function collectOpImages(op,images){
  function walk(o){if(o&&o.imgId){if(!o.url){const d=o.data||IMGCACHE[o.imgId];if(d)images[o.imgId]=d;}delete o.data;}}
  function ct(c){if(!c)return;if(c.managerSignature)walk(c.managerSignature);
    if(c.type==='KTX'){if(c.customer)['cccdPhoto','customerPhoto','signature'].forEach(k=>c.customer[k]&&walk(c.customer[k]));}
    else (c.customers||[]).forEach(x=>['cccdPhoto','customerPhoto','signature'].forEach(k=>x[k]&&walk(x[k])));}
  if(op.house){if(op.house.manager&&op.house.manager.signature)walk(op.house.manager.signature);(op.house.contracts||[]).forEach(ct);}
  if(op.contract)ct(op.contract);
  if(op.data)(op.data.houses||[]).forEach(h=>{if(h.manager&&h.manager.signature)walk(h.manager.signature);(h.contracts||[]).forEach(ct);});
}
async function flushOutbox(){
  const url=effectiveUrl();if(!url)return;
  const q=getOutbox();if(!q.length)return;
  if(_syncing)return;_syncing=true;
  const sendCount=q.length;
  const ops=JSON.parse(JSON.stringify(q.slice(0,sendCount)));
  const images={};ops.forEach(op=>collectOpImages(op,images));
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'ops',ops,images})});
    const txt=await res.text();const json=JSON.parse(txt);
    if(!json.ok)throw new Error(json.error||'Lỗi');
    _suppressAuto=true;applyUploaded(json.uploaded||{});_suppressAuto=false;
    const cfg=getSync();cfg.spreadsheetUrl=json.spreadsheetUrl||cfg.spreadsheetUrl;cfg.lastSync=Date.now();setSync(cfg);
    setOutbox(getOutbox().slice(sendCount));
    toast('✓ Đã đồng bộ','ok');
    if(getOutbox().length)scheduleFlush();
  }catch(e){_suppressAuto=false;/* giữ hàng đợi để thử lại sau */}
  finally{_syncing=false;}
}
function openSync(){const cfg=getSync();const embedded=!!(SYNC_URL&&SYNC_URL.trim());const url=effectiveUrl();
  const last=cfg.lastSync?new Date(cfg.lastSync).toLocaleString('vi-VN'):'Chưa đồng bộ';
  openModal({title:'Đồng bộ Google Sheet/Drive',
    bodyHTML:`<div class="card" style="margin-bottom:12px">
        <div class="kv"><span class="k">Trạng thái</span><span class="v">${url?'<span class="badge ok">Đã kết nối</span>':'<span class="badge danger">Chưa kết nối</span>'}</span></div>
        <div class="kv"><span class="k">Tự động đồng bộ</span><span class="v">${url?'<span class="badge ok">Đang bật</span>':'—'}</span></div>
        <div class="kv"><span class="k">Đồng bộ gần nhất</span><span class="v">${last}</span></div>
        ${cfg.spreadsheetUrl?`<div class="kv"><span class="k">Bảng tính</span><span class="v"><a href="${cfg.spreadsheetUrl}" target="_blank">Mở Google Sheet</a></span></div>`:''}</div>
      ${embedded
        ?`<p class="hint">URL Apps Script đã nhúng sẵn trong app — tự đồng bộ mỗi khi có thay đổi. Muốn đổi URL, sửa hằng <b>SYNC_URL</b> ở đầu file index.html.</p>`
        :`<div class="field"><label>URL Apps Script (Web App)</label>
            <input id="syncUrl" value="${esc(cfg.url||'')}" placeholder="https://script.google.com/macros/s/.../exec"></div>
          <button class="btn block" style="margin-bottom:10px" onclick="saveSyncUrl()">💾 Lưu kết nối</button>
          <p class="hint" style="margin:6px 0 12px">Chưa có URL? Mở file <b>HUONG_DAN_KET_NOI_GOOGLE.md</b> để tạo Apps Script (chỉ làm 1 lần).</p>`}
      <button class="btn ok block" id="syncBtn" onclick="syncNow()">☁️ Đồng bộ ngay</button>`,
    footHTML:`<button class="btn sec" onclick="closeModal()">Đóng</button>`});
}
function saveSyncUrl(){const u=$('#syncUrl').value.trim();const c=getSync();c.url=u;setSync(c);toast('Đã lưu kết nối','ok');if(u)doSync(true);}
function buildSyncPayload(){
  const all=JSON.parse(JSON.stringify(STORE.all()));const images={};
  function walk(o){if(o&&o.imgId){if(!o.url){const d=o.data||IMGCACHE[o.imgId];if(d)images[o.imgId]=d;}delete o.data;}}
  all.houses.forEach(h=>{if(h.manager&&h.manager.signature)walk(h.manager.signature);
    (h.contracts||[]).forEach(ct=>{if(ct.managerSignature)walk(ct.managerSignature);
      if(ct.type==='KTX'){if(ct.customer)['cccdPhoto','customerPhoto','signature'].forEach(k=>ct.customer[k]&&walk(ct.customer[k]));}
      else (ct.customers||[]).forEach(c=>['cccdPhoto','customerPhoto','signature'].forEach(k=>c[k]&&walk(c[k])));});});
  return {action:'sync',data:all,images};
}
function applyUploaded(map){
  function walk(o){if(o&&o.imgId&&map[o.imgId]){o.url=map[o.imgId];}}
  STORE.houses().forEach(h=>{if(h.manager&&h.manager.signature)walk(h.manager.signature);
    (h.contracts||[]).forEach(ct=>{if(ct.managerSignature)walk(ct.managerSignature);
      if(ct.type==='KTX'){if(ct.customer)['cccdPhoto','customerPhoto','signature'].forEach(k=>ct.customer[k]&&walk(ct.customer[k]));}
      else (ct.customers||[]).forEach(c=>['cccdPhoto','customerPhoto','signature'].forEach(k=>c[k]&&walk(c[k])));});});
  STORE.save();
}
function syncNow(){doSync(false);}
async function doSync(isAuto){
  const url=effectiveUrl();if(!url){if(!isAuto)toast('Chưa cấu hình URL Apps Script','err');return;}
  if(_syncing){if(!isAuto)scheduleAutoSync();return;}
  _syncing=true;
  const btn=$('#syncBtn');if(btn){btn.disabled=true;btn.textContent='⏳ Đang đồng bộ…';}
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(buildSyncPayload())});
    const txt=await res.text();let json;try{json=JSON.parse(txt);}catch(e){throw new Error('Phản hồi không hợp lệ. Kiểm tra lại URL/triển khai Apps Script.');}
    if(!json.ok)throw new Error(json.error||'Lỗi không rõ');
    _suppressAuto=true;applyUploaded(json.uploaded||{});_suppressAuto=false;
    const cfg=getSync();cfg.spreadsheetUrl=json.spreadsheetUrl||cfg.spreadsheetUrl;cfg.lastSync=Date.now();setSync(cfg);
    if(isAuto)toast('✓ Đã đồng bộ','ok');else{toast('Đồng bộ thành công','ok');openSync();}
  }catch(err){
    _suppressAuto=false;
    if(isAuto)toast('Chưa đồng bộ được — sẽ thử lại khi có thay đổi');
    else toast('Lỗi đồng bộ: '+err.message,'err');
  }
  finally{_syncing=false;const b=$('#syncBtn');if(b){b.disabled=false;b.textContent='☁️ Đồng bộ ngay';}}
}
/* Kéo dữ liệu mới nhất từ Google về (đồng bộ 2 chiều) */
async function pullFromServer(){
  const url=effectiveUrl();if(!url)return false;
  try{
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'pull'})});
    const txt=await res.text();const json=JSON.parse(txt);
    if(json&&json.ok&&json.data&&Array.isArray(json.data.houses)){
      const serverN=json.data.houses.length, localN=STORE.houses().length;
      if(serverN>0){
        _suppressAuto=true;STORE.import(JSON.stringify(json.data));_suppressAuto=false;
        const cfg=getSync();cfg.lastSync=Date.now();setSync(cfg);
        return true;
      }
      // Server trống nhưng máy này có dữ liệu -> đẩy lên khôi phục, KHÔNG xoá local
      if(serverN===0 && localN>0){ doSync(true); }
    }
  }catch(e){_suppressAuto=false;}
  return false;
}

    <label class="btn sec block" style="margin-bottom:6px">⬆️ Nhập dữ liệu từ file<input type="file" accept=".json,application/json" style="display:none" onchange="importData(this)"></label>`,
  footHTML:`<button class="btn sec" onclick="closeModal()">Đóng</button>`});}
function exportData(){const blob=new Blob([STORE.export()],{type:'application/json'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='nhatrolyson-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('Đã xuất dữ liệu','ok');}
function importData(input){const f=input.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{STORE.import(r.result);toast('Đã nhập dữ liệu','ok');closeModal();render();doSync(true);}catch(e){toast('File không hợp lệ','err');}};r.readAsText(f);}

/* ---------- navigation ---------- */
function goEntry(){APP.screen='entry';APP.houseId=null;scrollTop();render();}
function goSystem(){APP.screen='system';scrollTop();render();}
function enterHouse(id){APP.screen='house';APP.houseId=id;APP.tab='hopdong';APP.hdView='list';scrollTop();render();}
function setTab(t){APP.tab=t;scrollTop();render();}
function scrollTop(){window.scrollTo(0,0);}

render();
/* Mở app: mở IndexedDB -> nạp cache ảnh -> dọn ảnh cũ khỏi localStorage -> đồng bộ */
(async function(){
  try{await idbOpen();const all=await idbAll();all.forEach(x=>{IMGCACHE[x.imgId]=x.data;});}catch(e){}
  try{await migrateLocalImages();}catch(e){}
  render();
  if(effectiveUrl()){
    await flushOutbox();
    const ok=await pullFromServer();
    if(ok){render();toast('Đã tải dữ liệu mới nhất','ok');}
  }
})();
/* Quay lại app: gửi thao tác tồn rồi tải lại, nếu không đang nhập liệu */
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&!$('#modalBg').classList.contains('show')&&!_syncing){
    flushOutbox().then(function(){return pullFromServer();}).then(function(ok){if(ok)render();});
  }
});
</script>
</body>
</html>
